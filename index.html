<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive arrhythmias and cardiac arrest study website with rhythm pathways, ECG schematics, calculators, clinical cases, revision tools, and text-to-speech.">
  <meta name="theme-color" content="#0b2844">
  <title>RhythmLab | Arrhythmias & Cardiac Arrest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Course navigation">
      <div class="brand-block">
        <a class="brand" href="#overview" data-route="overview" aria-label="RhythmLab home">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path d="M7 34h11l5-15 9 31 8-22 6 11h11" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="32" cy="32" r="27" fill="none" stroke="currentColor" stroke-width="2" opacity=".25"/>
            </svg>
          </span>
          <span>
            <strong>RhythmLab</strong>
            <small>Arrhythmias & cardiac arrest</small>
          </span>
        </a>
        <button class="icon-button sidebar-close" id="sidebar-close" type="button" aria-label="Close navigation">×</button>
      </div>

      <nav class="course-nav" id="course-nav">
        <p class="nav-eyebrow">Connected study map</p>
      </nav>

      <div class="sidebar-progress" aria-label="Course progress">
        <div><span>Visited modules</span><strong id="progress-label">1 / 15</strong></div>
        <div class="progress-track" aria-hidden="true"><span id="progress-bar" style="width:6.67%"></span></div>
        <div class="sidebar-actions">
          <button class="text-button" id="reset-progress" type="button">Reset</button>
          <button class="text-button" id="clear-bookmarks" type="button">Clear bookmarks</button>
        </div>
      </div>
    </aside>

    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <div class="workspace">
      <header class="topbar">
        <button class="icon-button menu-button" id="menu-button" type="button" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
        <div class="topbar-title">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="current-section-label">Overview</span>
        </div>
        <div class="topbar-actions">
          <label class="search-box" for="site-search">
            <span aria-hidden="true">⌕</span>
            <input id="site-search" type="search" placeholder="Search rhythms, drugs, algorithms…" autocomplete="off">
            <kbd>/</kbd>
          </label>
          <button class="icon-button" id="bookmarks-button" type="button" aria-label="Show bookmarks" title="Show bookmarks">★</button>
          <div class="voice-pill" id="voice-pill" title="Text-to-speech voice">
            <span aria-hidden="true">◉</span><span id="voice-status">Loading voice…</span>
          </div>
          <label class="rate-control" for="speech-rate" title="Speech speed">
            <span>Speed</span>
            <select id="speech-rate">
              <option value="0.85">0.85×</option>
              <option value="0.95" selected>0.95×</option>
              <option value="1">1×</option>
              <option value="1.1">1.1×</option>
              <option value="1.2">1.2×</option>
            </select>
          </label>
          <button class="icon-button" id="stop-speech" type="button" aria-label="Stop speech" title="Stop speech">■</button>
          <button class="icon-button" id="print-button" type="button" aria-label="Print current module" title="Print current module">⎙</button>
        </div>
        <div class="search-results" id="search-results" role="listbox" aria-label="Search results" hidden></div>
      </header>

      <main id="main-content" tabindex="-1">
        <div id="app-content" aria-live="polite"></div>
      </main>

      <footer class="site-footer">
        <p><strong>RhythmLab</strong> is an educational study aid. In emergencies, follow local resuscitation protocols and trained clinical leadership.</p>
        <button class="text-button" data-route="sources" type="button">Sources, scope, and limitations</button>
      </footer>
    </div>
  </div>

  <dialog class="bookmark-dialog" id="bookmark-dialog">
    <div class="dialog-head">
      <div><p class="eyebrow">Saved for revision</p><h2>Bookmarks</h2></div>
      <button class="icon-button" id="close-bookmarks" type="button" aria-label="Close bookmarks">×</button>
    </div>
    <div id="bookmark-list"></div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
